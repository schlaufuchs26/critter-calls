[test]
preload = ["./tests/happydom.ts", "./tests/testing-library.ts"]

# Coverage: bun test --coverage or bun run test:coverage
# Thresholds fail the run if not met (CI-ready)
# coverageSkipTestFiles has a bug in Bun 1.3.14 — use path patterns instead
coveragePathIgnorePatterns = ["tests/**"]
coverageThreshold = { lines = 0.8, functions = 0.8, statements = 0.8 }
